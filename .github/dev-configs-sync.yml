# Sync-map for generated Flask repos.
# The workflow copies files from `dev-configs` into the generated repository.
#
# Notes:
# - Destination files must already exist; the workflow fails if a destination is missing.

dev_configs:
  repo: Randers-Kommune-Digitalisering/dev-configs
  ref: main

mappings:
  # Python tooling
  - dev_path: python/setup.cfg
    repo_path: setup.cfg

  # Copilot instruction files
  - dev_path: copilot-instructions/documentation-standards.instructions.md
    repo_path: .github/instructions/documentation-standards.instructions.md
  - dev_path: copilot-instructions/pr-review.instructions.md
    repo_path: .github/instructions/pr-review.instructions.md
  - dev_path: copilot-instructions/python-conventions.instructions.md
    repo_path: .github/instructions/python-conventions.instructions.md

  # Standard workflows
  - dev_path: github-workflows/build.yml
    repo_path: .github/workflows/build.yml
  - dev_path: github-workflows/lint-test.yml
    repo_path: .github/workflows/lint-test.yml
  - dev_path: github-workflows/test-report.yml
    repo_path: .github/workflows/test-report.yml
  - dev_path: github-workflows/deploy.yml
    repo_path: .github/workflows/deploy.yml

  # Dependabot config
  - dev_path: dependabot/dependabot.yml
    repo_path: .github/dependabot.yml
