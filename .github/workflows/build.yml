name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up build variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"

          # github.repository is "Owner/Repo".
          repo_lower="${GITHUB_REPOSITORY,,}"
          repo_name="${GITHUB_REPOSITORY#*/}"

          echo "repo_name=${repo_name}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${repo_lower}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

          # Only set version when building a v* tag.
          # Supports tags like v1.2.3 and v.1.2 (the leading dot is stripped).
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            version="${version#.}"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log into registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag existing image for release
        id: retag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          image='${{ steps.vars.outputs.image }}'
          commit_sha='${{ steps.vars.outputs.commit_sha }}'
          version='${{ steps.vars.outputs.version }}'

          if [[ -z "${version}" ]]; then
            echo "did_retag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Avoid rebuilding on tag pushes: if the commit was already built on main,
          # the image exists as :<commit_sha>. We can retag that image.
          if ! docker pull "${image}:${commit_sha}"; then
            echo "Image ${image}:${commit_sha} not found; falling back to build." >&2
            echo "did_retag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docker tag "${image}:${commit_sha}" "${image}:${version}"
          docker tag "${image}:${commit_sha}" "${image}:latest"
          docker push "${image}:${version}"
          docker push "${image}:latest"

          echo "did_retag=true" >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: tags
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') && steps.retag.outputs.did_retag == 'true') }}
        shell: bash
        run: |
          set -euo pipefail

          image='${{ steps.vars.outputs.image }}'
          version='${{ steps.vars.outputs.version }}'
          commit_sha='${{ steps.vars.outputs.commit_sha }}'

          tags="${image}:${commit_sha}"

          # Tag main builds as :dev
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=$'\n'"${image}:dev"
          fi

          # Tag release builds (v*) as :latest and :<version>
          if [[ "${GITHUB_REF}" == refs/tags/v* && -n "${version}" ]]; then
            tags+=$'\n'"${image}:latest"
            tags+=$'\n'"${image}:${version}"
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') && steps.retag.outputs.did_retag == 'true') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
